name: Deploy

# Manual deploy to AWS via SAM, authenticating with OIDC (no static keys).
# Mirrors what `cd aws && just deploy` does locally:
#   1. Check out wingnut128/netcidr at the requested ref
#   2. Build the React dashboard (with VITE_OAUTH_WEB_CLIENT_ID baked in)
#   3. Build the arm64 Lambda binary via cargo-lambda
#   4. sam build + sam deploy with parameter-overrides from repo secrets/vars
#
# Prereqs (one-time, see aws/oidc-bootstrap.yaml):
#   - GitHub OIDC provider exists in the target AWS account
#   - IAM role trusts this repo for OIDC; ARN stored as repo secret AWS_ROLE_TO_ASSUME
#   - Repo variables: AWS_REGION, PUBLIC_HOSTNAME, CERTIFICATE_ARN,
#     OIDC_AUDIENCE, OIDC_ALLOWED_EMAILS, ADMIN_EMAILS
#   - Repo secrets: AWS_ROLE_TO_ASSUME, DATABASE_URL

on:
  workflow_dispatch:
    inputs:
      netcidr_ref:
        description: "netcidr git ref to build (tag/branch/SHA)"
        required: false
        default: "main"
        type: string
      stack_name:
        description: "CloudFormation stack name"
        required: false
        default: "netcidr"
        type: string

permissions:
  id-token: write # OIDC → AWS
  contents: read

concurrency:
  # Don't deploy two builds against the same stack simultaneously.
  group: deploy-${{ inputs.stack_name }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check out deploy repo
        uses: actions/checkout@v6
        with:
          path: deploy

      - name: Check out netcidr source
        uses: actions/checkout@v6
        with:
          repository: wingnut128/netcidr
          ref: ${{ inputs.netcidr_ref }}
          path: netcidr

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Set up Rust (stable + aarch64-unknown-linux-musl)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Set up Zig (cargo-lambda's cross linker)
        uses: mlugg/setup-zig@v2

      - name: Install cargo-lambda
        run: |
          curl -fsSL https://github.com/cargo-lambda/cargo-lambda/releases/latest/download/cargo-lambda-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin cargo-lambda
          cargo-lambda --version

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build dashboard SPA
        working-directory: netcidr/dashboard
        env:
          # Vite bakes this into the bundle at build time. Same value as the
          # Lambda's NETCIDR_OIDC_AUDIENCE — the Google OAuth Web Client ID.
          VITE_OAUTH_WEB_CLIENT_ID: ${{ vars.OIDC_AUDIENCE }}
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build Lambda binary (arm64 musl)
        working-directory: netcidr
        run: |
          cargo lambda build --release --arm64 \
            --bin lambda --features lambda,ipam-postgres
          ls -lh target/lambda/lambda/bootstrap

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-actions-${{ github.run_id }}

      - name: SAM validate
        working-directory: deploy/aws
        run: sam validate --lint

      - name: SAM deploy
        working-directory: deploy/aws
        # All workflow_dispatch inputs and repo vars/secrets are passed as
        # env vars (never inlined into shell with `${{ … }}`) to avoid
        # injection if anyone supplies a malicious stack_name or ref.
        env:
          STACK_NAME: ${{ inputs.stack_name }}
          REGION: ${{ env.AWS_REGION }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OIDC_AUDIENCE: ${{ vars.OIDC_AUDIENCE }}
          OIDC_ALLOWED_EMAILS: ${{ vars.OIDC_ALLOWED_EMAILS }}
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
          PUBLIC_HOSTNAME: ${{ vars.PUBLIC_HOSTNAME }}
          CERTIFICATE_ARN: ${{ vars.CERTIFICATE_ARN }}
        run: |
          sam deploy \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "AppName=$STACK_NAME" \
              "DatabaseUrl=$DATABASE_URL" \
              "OidcAudience=$OIDC_AUDIENCE" \
              "OidcAllowedEmails=$OIDC_ALLOWED_EMAILS" \
              "AdminEmails=$ADMIN_EMAILS" \
              "PublicHostname=$PUBLIC_HOSTNAME" \
              "CertificateArn=$CERTIFICATE_ARN"

      - name: Show stack outputs
        env:
          STACK_NAME: ${{ inputs.stack_name }}
          REGION: ${{ env.AWS_REGION }}
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --query 'Stacks[0].Outputs' \
            --output table
