name: Deploy

# Manual deploy to AWS via SAM. Authenticates to AWS via GitHub OIDC (no
# static keys) and pulls deploy secrets from 1Password via a service
# account, mirroring the local `op inject` flow.
#
# Mirrors `cd aws && just deploy`:
#   1. Check out wingnut128/netcidr at the requested ref
#   2. Build the React dashboard (with VITE_OAUTH_WEB_CLIENT_ID baked in)
#   3. Build the arm64 Lambda binary via cargo-lambda
#   4. sam validate + sam deploy with parameter-overrides from 1Password
#
# One-time setup (see CLAUDE.md):
#   - 1Password service account scoped to the `netcidr-deployment` vault;
#     token stored as repo secret OP_SERVICE_ACCOUNT_TOKEN
#   - GitHub OIDC provider + IAM role provisioned via aws/oidc-bootstrap.yaml
#   - Repo secrets: OP_SERVICE_ACCOUNT_TOKEN
#   - Repo variables: AWS_REGION, PUBLIC_HOSTNAME, OIDC_ALLOWED_EMAILS, ADMIN_EMAILS

on:
  workflow_dispatch:
    inputs:
      netcidr_ref:
        description: "netcidr git ref to build (tag/branch/SHA)"
        required: false
        default: "main"
        type: string
      stack_name:
        description: "CloudFormation stack name"
        required: false
        default: "netcidr"
        type: string
  # Fired from wingnut128/netcidr's release workflow when a new vX.Y.Z
  # tag is published. Payload: { ref: "vX.Y.Z", stack: "netcidr" }.
  repository_dispatch:
    types: [netcidr-released]

permissions:
  id-token: write # OIDC → AWS
  contents: read

concurrency:
  group: deploy-${{ github.event.client_payload.stack || inputs.stack_name || 'netcidr' }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  # Resolve from repository_dispatch payload if dispatched, otherwise
  # from workflow_dispatch inputs, otherwise default. Each step uses
  # env.NETCIDR_REF / env.STACK_NAME instead of inputs/payload directly.
  NETCIDR_REF: ${{ github.event.client_payload.ref || inputs.netcidr_ref || 'main' }}
  STACK_NAME: ${{ github.event.client_payload.stack || inputs.stack_name || 'netcidr' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Check out deploy repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: deploy

      - name: Check out netcidr source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: wingnut128/netcidr
          ref: ${{ env.NETCIDR_REF }}
          path: netcidr

      # Pull deploy secrets from 1Password into env vars. Mirrors the
      # `op://netcidr-deployment/...` references in samconfig.toml.tpl.
      # The service account's token is the only credential GitHub holds;
      # everything else lives in the vault.
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AWS_ROLE_TO_ASSUME: op://netcidr-deployment/aws-deploy-role/arn
          DATABASE_URL: op://netcidr-deployment/neon/connect_string
          OIDC_AUDIENCE: op://netcidr-deployment/gcp-client-id/client_id
          CERTIFICATE_ARN: op://netcidr-deployment/certificate/arn
          CLOUDFLARE_API_TOKEN: op://netcidr-deployment/cloudflare/api_token
          CLOUDFLARE_ZONE_ID: op://netcidr-deployment/cloudflare/zone_id

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1"

      - name: Set up Rust (stable + aarch64-unknown-linux-musl)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Set up Zig (cargo-lambda's cross linker)
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.13.0

      - name: Install cargo-lambda
        uses: zerj9/setup-cargo-lambda@303bda14b6d3e285f2131217975156526bcde77b # v0.1.1

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@f84ec7d548307efafe33230528756de3c5841a17 # v2
        with:
          use-installer: true

      - name: Build dashboard SPA
        working-directory: netcidr/dashboard
        env:
          # Vite bakes this into the bundle. Same value as Lambda's
          # NETCIDR_OIDC_AUDIENCE — the Google OAuth Web Client ID,
          # already loaded into env by the 1Password step.
          VITE_OAUTH_WEB_CLIENT_ID: ${{ env.OIDC_AUDIENCE }}
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build Lambda binary (arm64 musl)
        working-directory: netcidr
        run: |
          cargo lambda build --release --arm64 \
            --bin lambda --features lambda,ipam-postgres
          ls -lh target/lambda/lambda/bootstrap

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-actions-${{ github.run_id }}

      - name: SAM validate
        working-directory: deploy/aws
        run: sam validate --lint

      - name: SAM deploy
        working-directory: deploy/aws
        # workflow_dispatch inputs and repo vars flow through env vars
        # (never inlined as `${{ … }}` into shell) to defuse injection.
        # DATABASE_URL / OIDC_AUDIENCE / CERTIFICATE_ARN already in env
        # from the 1Password step.
        env:
          STACK_NAME: ${{ env.STACK_NAME }}
          REGION: ${{ env.AWS_REGION }}
          OIDC_ALLOWED_EMAILS: ${{ vars.OIDC_ALLOWED_EMAILS }}
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
          PUBLIC_HOSTNAME: ${{ vars.PUBLIC_HOSTNAME }}
        run: |
          sam deploy \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "AppName=$STACK_NAME" \
              "DatabaseUrl=$DATABASE_URL" \
              "OidcAudience=$OIDC_AUDIENCE" \
              "OidcAllowedEmails=$OIDC_ALLOWED_EMAILS" \
              "AdminEmails=$ADMIN_EMAILS" \
              "PublicHostname=$PUBLIC_HOSTNAME" \
              "CertificateArn=$CERTIFICATE_ARN"

      - name: Show stack outputs
        env:
          STACK_NAME: ${{ env.STACK_NAME }}
          REGION: ${{ env.AWS_REGION }}
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --query 'Stacks[0].Outputs' \
            --output table

      - name: Sync Cloudflare DNS
        # Upserts the CNAME at $CLOUDFLARE_RECORD_NAME -> CloudFront
        # distribution domain (read from the stack output). Idempotent —
        # the same script local `just cloudflare-sync` runs.
        # CLOUDFLARE_API_TOKEN / CLOUDFLARE_ZONE_ID came from the
        # 1Password step. CLOUDFLARE_PROXIED is hardcoded false because
        # the architecture requires gray-cloud (CloudFront terminates
        # user-facing TLS; orange-cloud breaks Host-header rewriting).
        working-directory: deploy/aws
        env:
          CLOUDFLARE_RECORD_NAME: ${{ vars.CLOUDFLARE_RECORD_NAME }}
          CLOUDFLARE_PROXIED: "false"
          SAM_STACK_NAME: ${{ env.STACK_NAME }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: bash cloudflare/update-dns.sh
