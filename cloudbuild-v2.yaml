# Cloud Build pipeline for the Pulumi-managed netcidr v2 stack.
#
# Pulumi owns infrastructure, IAM, secrets, IAP, and Cloud Run configuration.
# This trigger clones upstream netcidr, builds with ipam-postgres, pushes the
# image, and updates only the Cloud Run service image.

steps:
  - id: clone
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    args:
      - -eu
      - -c
      - |
        git clone https://github.com/wingnut128/netcidr.git /workspace/netcidr
        cd /workspace/netcidr
        git checkout "${_NETCIDR_REF}"
        printf '%s\n' \
          'allow_public_bind = true' \
          'require_auth_for_public_bind = true' \
          'enable_swagger = true' \
          'ipam_enabled = true' \
          'ipam_backend = "postgres"' \
          'auth_mode = "oidc"' \
          > netcidr-cloudrun.toml
        sed -i '/^WORKDIR \/app/a COPY netcidr-cloudrun.toml /app/netcidr.toml' Dockerfile

  - id: build
    name: gcr.io/cloud-builders/docker
    dir: /workspace/netcidr
    entrypoint: bash
    args:
      - -eu
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}"
        docker build \
          --build-arg=FEATURES=${_FEATURES} \
          --build-arg=WITH_DASHBOARD=${_WITH_DASHBOARD} \
          --tag="$$IMAGE:${_NETCIDR_REF}" \
          --tag="$$IMAGE:latest" \
          .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}

  - id: deploy-image
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -eu
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest"
        gcloud run services update "${_SERVICE_NAME}" \
          --image="$$IMAGE" \
          --region="${_REGION}" \
          --project="$PROJECT_ID"

substitutions:
  _REGION: us-central1
  _AR_REPO: netcidr-v2-repo
  _IMAGE_NAME: netcidr-v2
  _SERVICE_NAME: netcidr-v2
  _NETCIDR_REF: v2
  _FEATURES: default,ipam-postgres
  _WITH_DASHBOARD: "true"

options:
  logging: CLOUD_LOGGING_ONLY
