# Cloud Build pipeline: fetch upstream netcidr at a ref, build with
# configurable Cargo FEATURES, push to Artifact Registry, deploy to Cloud Run.
#
# Submit:
#   gcloud builds submit --config=cloudbuild.yaml --no-source
#   gcloud builds submit --config=cloudbuild.yaml --no-source \
#     --substitutions=_NETCIDR_REF=latest           # highest semver tag upstream
#   gcloud builds submit --config=cloudbuild.yaml --no-source \
#     --substitutions=_NETCIDR_REF=v0.19.3,_FEATURES=swagger
#   gcloud builds submit --config=cloudbuild.yaml --no-source \
#     --substitutions=_NETCIDR_REF=v2,_IMAGE_NAME=netcidr-v2,_SERVICE_NAME=netcidr-v2
#
# Note: Cloud Build parses every $VAR / ${VAR} in this file as a substitution
# reference. Bash-local variables must be written with a doubled `$` ($$VAR)
# so they reach the shell intact. Built-ins ($PROJECT_ID) and user subs
# (${_NETCIDR_REF}) stay bare.

steps:
  - id: clone
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    args:
      - -eu
      - -c
      - |
        REF="${_NETCIDR_REF}"
        if [ "$$REF" = "latest" ]; then
          REF=$$(git ls-remote --tags --sort=-version:refname \
                    https://github.com/wingnut128/netcidr.git 'v*.*.*' \
                  | awk '{print $$2}' \
                  | grep -v '\^{}' \
                  | head -1 \
                  | sed 's|refs/tags/||')
          echo "Resolved _NETCIDR_REF=latest → $$REF"
        fi
        echo "$$REF" > /workspace/resolved-ref
        git clone https://github.com/wingnut128/netcidr.git /workspace/netcidr
        cd /workspace/netcidr
        git checkout "$$REF"
        if [ "${_ALLOW_PUBLIC_BIND}" = "true" ]; then
          printf '%s\n' \
            'allow_public_bind = true' \
            'require_auth_for_public_bind = false' \
            'enable_swagger = true' \
            > netcidr-cloudrun.toml
          sed -i '/^FROM cgr.dev\/chainguard\/static/a COPY netcidr-cloudrun.toml /app/netcidr.toml' Dockerfile
        fi

  - id: build
    name: gcr.io/cloud-builders/docker
    dir: /workspace/netcidr
    entrypoint: bash
    args:
      - -eu
      - -c
      - |
        REF=$$(cat /workspace/resolved-ref)
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}"
        docker build \
          --build-arg=FEATURES=${_FEATURES} \
          --build-arg=WITH_DASHBOARD=${_WITH_DASHBOARD} \
          --tag="$$IMAGE:$$REF" \
          --tag="$$IMAGE:latest" \
          .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -eu
      - -c
      - |
        REF=$$(cat /workspace/resolved-ref)
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$$REF"
        RUN_ARGS=(serve --address 0.0.0.0 --port 8080 --enable-swagger)
        if [ "${_ALLOW_PUBLIC_BIND}" = "true" ]; then
          RUN_ARGS+=(--config /app/netcidr.toml)
        fi

        gcloud run deploy ${_SERVICE_NAME} \
          --image="$$IMAGE" \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=256Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --concurrency=80 \
          --timeout=30 \
          --cpu-throttling \
          --set-env-vars=RUST_LOG=info \
          --args="$$(IFS=,; echo "$${RUN_ARGS[*]}")"

substitutions:
  _REGION: us-central1
  _AR_REPO: netcidr-repo
  _IMAGE_NAME: netcidr
  _SERVICE_NAME: netcidr
  _ALLOW_PUBLIC_BIND: "false"
  # Default pinned to the "migrate Dockerfile runtime to Chainguard static base"
  # commit on main, which includes the curl install needed by utoipa-swagger-ui's
  # build script. Pass `_NETCIDR_REF=latest` to auto-resolve to the highest
  # upstream semver tag (safe once upstream cuts v0.19.4 or later).
  _NETCIDR_REF: afd5fb9e106ac098a75f5a794af9bbb631dd41b3
  _FEATURES: default
  _WITH_DASHBOARD: "true"

options:
  logging: CLOUD_LOGGING_ONLY
